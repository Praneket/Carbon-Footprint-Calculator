<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History Analytics — EcoTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="icon" type="image/webp" href="{{ url_for('static', filename='OIP.webp') }}" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-leaf-fill text-success me-2 animate-float d-inline-block"></i>EcoTrack</a>
    <div class="ms-auto d-flex gap-2">
      <a href="/" class="btn btn-outline-eco btn-sm">
        <i class="bi bi-plus-circle me-1"></i>New Calculation
      </a>
      <button id="themeToggle" class="btn-theme btn">
        <i class="bi bi-moon-fill"></i>
      </button>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero text-center" style="padding:3rem 0 2.5rem;">
  <div class="container">
    <div class="hero-badge">📊 ANALYTICS DASHBOARD</div>
    <h1 class="animate-glow mt-3">History & Analytics</h1>
    <p style="color:var(--text-sub);">Track your carbon footprint over time and spot trends.</p>
  </div>
</section>

<div class="container py-4" style="position:relative;z-index:1;" id="mainContent">
  <!-- Loaded by JS -->
  <div class="text-center py-5" id="loadingState">
    <div class="spinner-border" style="color:var(--accent);width:3rem;height:3rem;" role="status"></div>
    <p class="mt-3" style="color:var(--muted);font-family:'Orbitron',sans-serif;font-size:0.8rem;letter-spacing:0.1em;">LOADING DATA…</p>
  </div>
</div>

<!-- Drilldown Modal -->
<div class="modal fade" id="drillModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="drillTitle"><i class="bi bi-bar-chart-fill me-2"></i>Record Detail</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="drillBody"></div>
    </div>
  </div>
</div>

<footer class="text-center py-3">🌿 EcoTrack — Carbon Footprint Calculator</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ── Theme ── */
const toggle = document.getElementById('themeToggle');
const root   = document.documentElement;
const saved  = localStorage.getItem('theme') || 'light';
root.setAttribute('data-theme', saved);
toggle.innerHTML = saved === 'dark' ? '<i class="bi bi-sun-fill"></i>' : '<i class="bi bi-moon-fill"></i>';
toggle.addEventListener('click', () => {
  const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  toggle.innerHTML = next === 'dark' ? '<i class="bi bi-sun-fill"></i>' : '<i class="bi bi-moon-fill"></i>';
  rebuildCharts();
});

function isDark()    { return root.getAttribute('data-theme') === 'dark'; }
function textColor() { return isDark() ? '#e2ffe8' : '#0f1f0f'; }
function mutedCol()  { return isDark() ? '#6ee7a0' : '#6b7280'; }
function gridCol()   { return isDark() ? 'rgba(26,77,46,0.5)' : 'rgba(187,247,208,0.5)'; }

let allRows = [];
let trendChart, stackChart, scoreChart;

/* ── Fetch & Render ── */
async function init() {
  const res = await fetch('/history/analytics');
  allRows   = await res.json();
  document.getElementById('loadingState').remove();

  if (!allRows.length) {
    document.getElementById('mainContent').innerHTML = `
      <div class="text-center py-5">
        <i class="bi bi-inbox fs-1" style="color:var(--muted);"></i>
        <p class="mt-3" style="color:var(--muted);font-family:'Orbitron',sans-serif;font-size:0.85rem;letter-spacing:0.08em;">
          NO RECORDS YET — CALCULATE YOUR FIRST FOOTPRINT
        </p>
        <a href="/" class="btn btn-eco mt-2">Get Started</a>
      </div>`;
    return;
  }

  renderSummaryCards();
  renderCharts();
  renderTable();

  /* scroll reveal */
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal, .reveal-left, .reveal-right').forEach(el => obs.observe(el));
}

/* ── Summary Cards ── */
function renderSummaryCards() {
  const totals  = allRows.map(r => r.total);
  const avg     = (totals.reduce((a,b) => a+b, 0) / totals.length).toFixed(1);
  const best    = Math.min(...totals).toFixed(1);
  const worst   = Math.max(...totals).toFixed(1);
  const trend   = allRows.length > 1
    ? (totals[totals.length-1] - totals[0]).toFixed(1)
    : 0;
  const trendIcon  = trend <= 0
    ? '<i class="bi bi-arrow-down-circle-fill" style="color:#22c55e;"></i>'
    : '<i class="bi bi-arrow-up-circle-fill" style="color:#ef4444;"></i>';
  const trendColor = trend <= 0 ? '#22c55e' : '#ef4444';

  const html = `
  <div class="row g-3 mb-4">
    ${[
      ['Total Records',   allRows.length,        'bi-database-fill',         '#60a5fa'],
      ['Avg Footprint',   avg + ' kg',            'bi-graph-up',              '#fbbf24'],
      ['Best Score',      best + ' kg',           'bi-trophy-fill',           '#22c55e'],
      ['Highest Record',  worst + ' kg',          'bi-exclamation-triangle-fill','#ef4444'],
    ].map(([label, val, icon, color], i) => `
      <div class="col-6 col-md-3 reveal delay-${i+1}">
        <div class="card stat-card text-center h-100">
          <div class="card-body py-3">
            <i class="bi ${icon} fs-2" style="color:${color};filter:drop-shadow(0 0 6px ${color}88);"></i>
            <div class="stat-number mt-2" style="font-size:1.25rem;">${val}</div>
            <div class="stat-label">${label}</div>
          </div>
        </div>
      </div>`).join('')}
    <div class="col-12 col-md-12 reveal delay-5">
      <div class="card stat-card">
        <div class="card-body d-flex align-items-center gap-3 py-3">
          <span style="font-size:1.8rem;">${trendIcon}</span>
          <div>
            <div style="font-family:'Orbitron',sans-serif;font-size:0.8rem;letter-spacing:0.08em;color:var(--muted);">OVERALL TREND</div>
            <div style="font-family:'Orbitron',sans-serif;font-size:1.1rem;color:${trendColor};font-weight:700;">
              ${trend > 0 ? '+' : ''}${trend} kg CO₂
              <span style="font-size:0.75rem;color:var(--muted);font-weight:400;"> from first to latest record</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById('mainContent').insertAdjacentHTML('beforeend', html);
}

/* ── Charts ── */
function renderCharts() {
  const labels = allRows.map(r => `#${r.id} ${r.name || ''} (${r.date.slice(0,10)})`);
  const shortLabels = allRows.map(r => `#${r.id} ${r.date.slice(0,10)}`);

  const html = `
  <div class="row g-4 mb-4">
    <div class="col-12 reveal">
      <div class="card section-card">
        <div class="card-header section-header">
          <i class="bi bi-graph-up me-2" style="color:var(--accent2);"></i>Total Footprint Trend
        </div>
        <div class="card-body"><canvas id="trendChart" style="max-height:260px;"></canvas></div>
      </div>
    </div>
    <div class="col-md-7 reveal-left">
      <div class="card section-card h-100">
        <div class="card-header section-header">
          <i class="bi bi-bar-chart-stacked me-2" style="color:var(--accent2);"></i>Category Breakdown per Record
        </div>
        <div class="card-body"><canvas id="stackChart" style="max-height:280px;"></canvas></div>
      </div>
    </div>
    <div class="col-md-5 reveal-right">
      <div class="card section-card h-100">
        <div class="card-header section-header">
          <i class="bi bi-pie-chart-fill me-2" style="color:var(--accent2);"></i>Score Distribution
        </div>
        <div class="card-body d-flex align-items-center justify-content-center">
          <canvas id="scoreChart" style="max-height:260px;"></canvas>
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById('mainContent').insertAdjacentHTML('beforeend', html);

  buildTrendChart(shortLabels);
  buildStackChart(shortLabels);
  buildScoreChart();
}

function buildTrendChart(labels) {
  trendChart = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Total kg CO₂/year',
        data: allRows.map(r => r.total),
        borderColor: '#22c55e',
        backgroundColor: isDark() ? 'rgba(34,197,94,0.12)' : 'rgba(22,163,74,0.1)',
        borderWidth: 2.5,
        pointBackgroundColor: '#22c55e',
        pointRadius: 5,
        pointHoverRadius: 8,
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      animation: { duration: 1000 },
      plugins: { legend: { labels: { color: textColor(), font: { family: 'Exo 2' } } } },
      scales: {
        x: { ticks: { color: textColor(), font: { family: 'Exo 2', size: 11 }, maxRotation: 30 }, grid: { color: gridCol() } },
        y: { beginAtZero: true, ticks: { color: textColor(), font: { family: 'Exo 2' } }, grid: { color: gridCol() },
             title: { display: true, text: 'kg CO₂/year', color: mutedCol(), font: { family: 'Exo 2' } } }
      }
    }
  });
}

function buildStackChart(labels) {
  stackChart = new Chart(document.getElementById('stackChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Transport', data: allRows.map(r => r.transport), backgroundColor: isDark() ? 'rgba(96,165,250,0.8)'  : 'rgba(59,130,246,0.8)',  borderRadius: 4 },
        { label: 'Energy',    data: allRows.map(r => r.energy),    backgroundColor: isDark() ? 'rgba(251,191,36,0.8)'  : 'rgba(245,158,11,0.8)',  borderRadius: 4 },
        { label: 'Food',      data: allRows.map(r => r.food),      backgroundColor: isDark() ? 'rgba(248,113,113,0.8)' : 'rgba(239,68,68,0.8)',   borderRadius: 4 },
        { label: 'Waste',     data: allRows.map(r => r.waste),     backgroundColor: isDark() ? 'rgba(148,163,184,0.8)' : 'rgba(107,114,128,0.8)', borderRadius: 4 },
      ]
    },
    options: {
      animation: { duration: 1000 },
      plugins: { legend: { labels: { color: textColor(), font: { family: 'Exo 2' } } } },
      scales: {
        x: { stacked: true, ticks: { color: textColor(), font: { family: 'Exo 2', size: 11 }, maxRotation: 30 }, grid: { color: gridCol() } },
        y: { stacked: true, beginAtZero: true, ticks: { color: textColor(), font: { family: 'Exo 2' } }, grid: { color: gridCol() },
             title: { display: true, text: 'kg CO₂/year', color: mutedCol(), font: { family: 'Exo 2' } } }
      }
    }
  });
}

function buildScoreChart() {
  const counts = { Low: 0, Medium: 0, High: 0 };
  allRows.forEach(r => { if (counts[r.score] !== undefined) counts[r.score]++; });
  scoreChart = new Chart(document.getElementById('scoreChart'), {
    type: 'doughnut',
    data: {
      labels: ['Low', 'Medium', 'High'],
      datasets: [{
        data: [counts.Low, counts.Medium, counts.High],
        backgroundColor: ['rgba(34,197,94,0.8)', 'rgba(245,158,11,0.8)', 'rgba(239,68,68,0.8)'],
        borderColor: isDark() ? '#0a1f10' : '#fff',
        borderWidth: 3,
        hoverOffset: 10
      }]
    },
    options: {
      cutout: '65%',
      animation: { animateRotate: true, duration: 1200 },
      plugins: { legend: { position: 'bottom', labels: { color: textColor(), font: { family: 'Exo 2' }, padding: 16 } } }
    }
  });
}

function rebuildCharts() {
  [trendChart, stackChart, scoreChart].forEach(c => c && c.destroy());
  const labels = allRows.map(r => `#${r.id} ${r.date.slice(0,10)}`);
  buildTrendChart(labels);
  buildStackChart(labels);
  buildScoreChart();
}

/* ── Table ── */
function renderTable() {
  const scoreColor = s => s === 'Low' ? '#22c55e' : s === 'Medium' ? '#f59e0b' : '#ef4444';
  let rows = [...allRows].reverse().map(r => `
    <tr style="cursor:pointer;" onclick="showDrill(${r.id})">
      <td>${r.id}</td>
      <td>${r.date}</td>
      <td>${r.name || '—'}</td>
      <td>${r.transport}</td>
      <td>${r.energy}</td>
      <td>${r.food}</td>
      <td>${r.waste}</td>
      <td><strong>${r.total}</strong></td>
      <td>
        <span style="background:${scoreColor(r.score)}22;color:${scoreColor(r.score)};
          border:1px solid ${scoreColor(r.score)};border-radius:6px;
          padding:2px 10px;font-size:0.78rem;font-family:'Orbitron',sans-serif;letter-spacing:0.06em;">
          ${r.score}
        </span>
      </td>
    </tr>`).join('');

  const html = `
  <div class="card section-card mb-4 reveal">
    <div class="card-header section-header d-flex align-items-center justify-content-between">
      <span><i class="bi bi-table me-2" style="color:var(--accent2);"></i>All Records</span>
      <span style="font-size:0.75rem;color:var(--muted);">Click any row for full breakdown</span>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0" id="historyTable">
          <thead>
            <tr>
              <th>#</th><th>Date</th><th>Name</th>
              <th>Transport</th><th>Energy</th><th>Food</th><th>Waste</th>
              <th>Total (kg CO₂)</th><th>Score</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  </div>`;
  document.getElementById('mainContent').insertAdjacentHTML('beforeend', html);
}

/* ── Drilldown Modal ── */
function showDrill(id) {
  const r = allRows.find(x => x.id === id);
  if (!r) return;
  const sc = r.score === 'Low' ? '#22c55e' : r.score === 'Medium' ? '#f59e0b' : '#ef4444';
  const pct = Math.min(Math.round((r.total / 10000) * 100), 100);

  document.getElementById('drillTitle').innerHTML =
    `<i class="bi bi-bar-chart-fill me-2"></i>Record #${r.id} — ${r.name || 'Anonymous'}`;

  document.getElementById('drillBody').innerHTML = `
    <div class="row g-3 mb-3">
      ${[
        ['Transport', r.transport, '#60a5fa', 'car-front-fill'],
        ['Energy',    r.energy,    '#fbbf24', 'lightning-charge-fill'],
        ['Food',      r.food,      '#f87171', 'egg-fried'],
        ['Waste',     r.waste,     '#94a3b8', 'trash3-fill'],
      ].map(([label, val, color, icon]) => `
        <div class="col-6">
          <div class="card stat-card text-center">
            <div class="card-body py-3">
              <i class="bi bi-${icon} fs-3" style="color:${color};"></i>
              <div style="font-family:'Orbitron',sans-serif;font-weight:700;font-size:1.1rem;color:${color};" class="mt-2">${val}</div>
              <div class="stat-label">kg CO₂ — ${label}</div>
            </div>
          </div>
        </div>`).join('')}
    </div>

    <div class="card stat-card mb-3">
      <div class="card-body text-center py-3">
        <div class="stat-label mb-1">Total Annual Footprint</div>
        <div style="font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:700;color:${sc};
                    text-shadow:0 0 20px ${sc}88;">${r.total} kg CO₂</div>
        <span style="background:${sc}22;color:${sc};border:1px solid ${sc};border-radius:20px;
                     padding:4px 16px;font-family:'Orbitron',sans-serif;font-size:0.75rem;letter-spacing:0.1em;">
          ● ${r.score.toUpperCase()} FOOTPRINT
        </span>
        <div class="eco-meter mt-3">
          <div class="eco-meter-fill" style="width:${pct}%;"></div>
        </div>
        <div class="mt-1" style="font-size:0.75rem;color:var(--muted);">${r.total} / 10,000 kg scale</div>
      </div>
    </div>

    <div class="row g-2 text-center" style="font-size:0.85rem;color:var(--text-sub);">
      <div class="col-4"><span class="stat-label">Date</span><br/>${r.date}</div>
      <div class="col-4"><span class="stat-label">Diet</span><br/>${r.diet || '—'}</div>
      <div class="col-4"><span class="stat-label">Record ID</span><br/>#${r.id}</div>
    </div>

    <div class="mt-3">
      <canvas id="drillDonut" style="max-height:220px;"></canvas>
    </div>`;

  new bootstrap.Modal(document.getElementById('drillModal')).show();

  /* mini donut inside modal */
  setTimeout(() => {
    new Chart(document.getElementById('drillDonut'), {
      type: 'doughnut',
      data: {
        labels: ['Transport','Energy','Food','Waste'],
        datasets: [{
          data: [r.transport, r.energy, r.food, r.waste],
          backgroundColor: ['#3b82f6','#f59e0b','#ef4444','#6b7280'],
          borderColor: isDark() ? '#0a1f10' : '#fff',
          borderWidth: 3, hoverOffset: 8
        }]
      },
      options: {
        cutout: '65%',
        plugins: { legend: { position: 'bottom', labels: { color: textColor(), font: { family: 'Exo 2' }, padding: 14 } } }
      }
    });
  }, 300);
}

/* ── Particles ── */
(function() {
  const canvas = document.getElementById('particle-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = document.body.scrollHeight; }
  function Particle() {
    this.x = Math.random()*W; this.y = Math.random()*H;
    this.r = Math.random()*2+0.5; this.vx = (Math.random()-0.5)*0.4;
    this.vy = -Math.random()*0.5-0.2; this.alpha = Math.random()*0.6+0.2;
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    const color = isDark() ? '74,222,128' : '22,163,74';
    particles.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(${color},${p.alpha})`; ctx.fill();
      p.x+=p.vx; p.y+=p.vy;
      if(p.y<-10){p.y=H+10;p.x=Math.random()*W;}
      if(p.x<0||p.x>W) p.vx*=-1;
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  resize(); particles = Array.from({length:80},()=>new Particle()); draw();
})();

init();
</script>
</body>
</html>
